<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connex</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <div class="container">

        <div class="logo">
            <div class="circle">💬</div>
            <span>Connex</span>
        </div>

        <img src="media/planeta.png" class="planeta">

        <h1>Bienvenido a Connex</h1>

        <p class="frase">
            “Conectando mundos, un mensaje a la vez.”
        </p>

        <p class="descripcion">
            Bienvenido a Connex, la plataforma diseñada para conectar
            personas de cualquier parte del mundo.
        </p>

        <div class="button-group">
            <a href="/login">
                <button class="btn-primary">Iniciar sesión</button>
            </a>
            <a href="/registro">
                <button class="btn-secondary">Registrarse</button>
            </a>
            <a href="/admin">
                <button class="btn-admin">Ingresar como Admin</button>
            </a>
        </div>

    </div>

</html>
