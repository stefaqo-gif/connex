<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConneX - Gestión de Grupos</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="css/global.css"> 
    <link rel="stylesheet" href="css/grupos.css">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="logo">C</div>
            <div class="nav-icons">
                <span class="material-icons" onclick="location.href='chats.html'">chat</span>
                <span class="material-icons" onclick="location.href='contactos.html'">group</span>
                <span class="material-icons active" onclick="location.href='grupos.html'">groups</span>
                <span class="material-icons" onclick="location.href='estados.html'">visibility</span>
            </div>
            <div class="nav-bottom">
                <span class="material-icons" onclick="location.href='ajustes.html'">settings</span>
            </div>
        </nav>

        <main class="main-content">
            <header class="header-section">
                <div class="title-area">
                    <h1>Grupos</h1>
                    <span class="badge" id="countGrupos">0 Grupos</span>
                </div>
                
                <div class="action-bar">
                    <div class="search-box">
                        <i class="material-icons">search</i>
                        <input type="text" id="inputBuscar" placeholder="Buscar grupo...">
                    </div>
                    <button class="btn-create" id="btnAbrirModal">
                        <i class="material-icons">add</i> 
                        <span>Nuevo Grupo</span>
                    </button>
                </div>
            </header>

            <section id="listaGrupos" class="groups-grid">
                <div class="loader-container">
                    <p>Cargando tus grupos...</p>
                </div>
            </section>
        </main>
    </div>

    <div id="modalGrupo" class="modal-overlay">
        <div class="modal-card">
            <h2>Nuevo Grupo</h2>
            <div class="group-info-setup">
                <div class="avatar-setup" onclick="document.getElementById('inputFoto').click()">
                    <i class="material-icons" id="iconCamara">add_a_photo</i>
                    <img id="previewFoto" style="display:none; width: 100%; height: 100%; object-fit: cover;">
                    <input type="file" id="inputFoto" hidden accept="image/*">
                </div>

                <div class="inputs">
                    <input type="text" id="nombreGrupo" placeholder="Nombre del grupo" required>
                    <textarea id="descGrupo" placeholder="Descripción (Opcional)"></textarea>
                </div>
            </div>

            <h3>Seleccionar Participantes</h3>
            <div class="members-selection" id="listaContactos">
                </div>

            <div class="modal-actions">
                <button class="btn-cancel" id="btnCancelar">Cancelar</button>
                <button class="btn-submit" id="btnCrearGrupoFinal">Crear Grupo</button>
            </div>
        </div>
    </div>

    <div id="photo-viewer" onclick="this.style.display='none'">
        <span class="close-viewer">&times;</span>
        <img id="viewer-img">
        <p id="viewer-caption"></p>
    </div>

    <script src="js/cifrado.js"></script>
    <script src="js/grupos.js"></script>
    <script>
        // Lógica de Previsualización de Imagen
        const inputFoto = document.getElementById('inputFoto');
        const previewImg = document.getElementById('previewFoto');
        const iconCamara = document.getElementById('iconCamara');

        inputFoto.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    iconCamara.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
