<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connex - Iniciar Sesión</title>
    <link rel="stylesheet" href="/css/registro.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="card">
        <div class="back-button">
            <a href="/" class="back-arrow">
                <span class="material-icons">arrow_back</span>
            </a>
        </div>
        <div class="logo">
            <div class="circle">💬</div>
        </div>
        <h1>Connex</h1>
        <p class="subtitle">Inicia sesión para continuar</p>

        <form id="formLogin">
            <label>Correo electrónico o teléfono</label>
            <input type="text" id="identificador" class="input" placeholder="correo@ejemplo.com o +50688888888" required>

            <button type="submit" id="btnLogin">Iniciar sesión</button>
        </form>

        <div class="register-link">
            ¿No tienes cuenta? <a href="/registro">Regístrate aquí</a>
        </div>
    </div>

    <style>
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #888;
        }
        .register-link a {
            color: #7b2ff7;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>

    <script src="/js/verificar-sesion.js"></script>
    <script>
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const identificador = document.getElementById('identificador').value.trim();
            const btnLogin = document.getElementById('btnLogin');
            
            if (!identificador) {
                alert('Por favor ingresa tu correo o teléfono');
                return;
            }
            
            btnLogin.disabled = true;
            btnLogin.textContent = 'Buscando...';
            
            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ identificador })
                });
                
                const data = await response.json();
                
                if (response.ok && data.usuarioId) {
                    // Guardar en sessionStorage (se borra al cerrar el navegador)
                    sessionStorage.setItem('usuarioId', data.usuarioId);
                    sessionStorage.setItem('userEmail', data.correo);
                    sessionStorage.setItem('userName', data.nombre_usuario);
                    if (data.foto_url) {
                        sessionStorage.setItem('userFoto', data.foto_url);
                    }
                    
                    // Redirigir a chats
                    window.location.href = '/chats';
                } else {
                    alert(data.error || 'Usuario no encontrado');
                    btnLogin.disabled = false;
                    btnLogin.textContent = 'Iniciar sesión';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error de conexión');
                btnLogin.disabled = false;
                btnLogin.textContent = 'Iniciar sesión';
            }
        });
    </script>
</body>
</html>
