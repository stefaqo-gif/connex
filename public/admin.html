<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connex Admin</title>
    <link rel="stylesheet" href="/css/admin.css">
</head>

<body>

    <div class="container">

        <div class="logo">
            <div class="circle">💬</div>
            <span>Connex</span>
            <span class="admin-badge">Admin</span>
        </div>

        <h1>Panel de administración</h1>

        <p class="subtitulo">
            Ingresa tu correo electrónico para acceder
        </p>

        <form class="login-form" id="loginForm">
            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="Ingresa tu correo electrónico" required>
            </div>

            <button type="submit" class="btn-admin-login">Iniciar sesión</button>
        </form>

        <a href="/" class="back-link">← Volver al inicio</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            if (!email) {
                alert('Por favor ingresa tu correo electrónico');
                return;
            }
            
            try {
                const response = await fetch('/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    window.location.href = `/admin/verificacionadmin?email=${encodeURIComponent(email)}`;
                } else {
                    alert(data.message || 'Error al iniciar sesión');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error de conexión con el servidor');
            }
        });
    </script>
</body>

</html>
